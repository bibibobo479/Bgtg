<!DOCTYPE html>
<html>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Чат с файлами</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f0f2f5; height: 100vh; overflow: hidden; }
        #chat { width: 100%; max-width: 500px; margin: 0 auto; background: white; height: 100vh; display: flex; flex-direction: column; }
        #header { background: #075E54; color: white; padding: 15px; display: flex; justify-content: space-between; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; background: #e5ddd5; }
        .message { margin: 5px 0; padding: 8px 12px; border-radius: 7px; max-width: 80%; word-wrap: break-word; }
        .my { background: #DCF8C6; margin-left: auto; }
        .other { background: white; }
        .system { background: rgba(0,0,0,0.5); color: white; margin: 0 auto; text-align: center; }
        #input-area { background: #f0f0f0; padding: 10px; display: flex; gap: 10px; align-items: center; }
        #text { flex: 1; padding: 10px; border: none; border-radius: 20px; outline: none; }
        #send-btn { width: 50px; height: 50px; border-radius: 50%; background: #075E54; color: white; border: none; cursor: pointer; }
        #send-btn:disabled { background: #ccc; cursor: not-allowed; }
        #file-btn { width: 40px; height: 40px; border-radius: 50%; background: #2196F3; color: white; border: none; cursor: pointer; }
        #file-btn:disabled { background: #ccc; cursor: not-allowed; }
        #file-input { display: none; }
        #connect-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #075E54; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #connect-screen.hidden { display: none; }
        #connect-screen input { padding: 10px; width: 80%; margin-bottom: 10px; border: none; border-radius: 5px; }
        #connect-screen button { padding: 10px 20px; background: #25D366; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #status { padding: 5px 10px; border-radius: 5px; }
        #file-progress { display: none; padding: 8px; background: #e3f2fd; border-radius: 5px; margin: 5px; text-align: center; }
        .media-preview { max-width: 200px; max-height: 200px; border-radius: 5px; margin-top: 5px; cursor: pointer; }
        .file-link { color: #2196F3; text-decoration: none; }
        .file-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div id='chat'>
        <div id='connect-screen'>
            <h1 style='color:white; margin-bottom:20px;'>Чат с файлами</h1>
            <input type='text' id='device-input' placeholder='Ваше имя' value='User'>
            <button onclick='connect()'>Войти</button>
        </div>
        <div id='header'>
            <span id='device-name'></span>
            <span id='status'>🔴 Отключено</span>
        </div>
        <div id='messages'></div>
        <div id='file-progress'></div>
        <div id='input-area'>
            <input type='text' id='text' placeholder='Сообщение...' disabled>
            <input type='file' id='file-input'>
            <button id='file-btn' onclick='selectFile()' disabled>📎</button>
            <button id='send-btn' onclick='send()' disabled>➤</button>
        </div>
    </div>

    <script>
        let ws = null;
        let device = '';
        let connected = false;
        const WS_URL = 'ws://188.92.28.209:8080/ws/chat/';

        function connect() {
            device = document.getElementById('device-input').value.trim();
            if (!device) device = 'User' + Math.floor(Math.random() * 1000);

            document.getElementById('device-name').innerText = device;
            document.getElementById('connect-screen').classList.add('hidden');
            
            ws = new WebSocket(WS_URL + encodeURIComponent(device));

            ws.onopen = function() {
                connected = true;
                document.getElementById('status').innerHTML = '🟢 Подключено';
                document.getElementById('text').disabled = false;
                document.getElementById('send-btn').disabled = false;
                document.getElementById('file-btn').disabled = false;
                addSystemMessage('✅ Подключился к чату');
                document.getElementById('text').focus();
            };

            ws.onmessage = function(event) {
                if (typeof event.data === 'string') {
                    try {
                        const data = JSON.parse(event.data);
                        console.log('Получено:', data.type);
                        
                        if (data.type === 'message') {
                            addMessage(data);
                        } 
                        else if (data.type === 'history' && data.messages) {
                            document.getElementById('messages').innerHTML = '';
                            data.messages.forEach(m => addMessage(m));
                            addSystemMessage('📜 История загружена (' + data.messages.length + ' сообщений)');
                        }
                        else if (data.type === 'upload_complete') {
                            // Файл подтвержден сервером
                            const progress = document.getElementById('file-progress');
                            progress.innerHTML = `✅ Файл загружен: ${data.fileName}`;
                            setTimeout(() => progress.style.display = 'none', 3000);
                            
                            // Отправляем сообщение о файле в чат
                            const fileMsg = {
                                type: 'message',
                                text: '📎 ' + data.fileName,
                                fileId: data.fileId,
                                fileName: data.fileName,
                                fileType: data.fileType
                            };
                            ws.send(JSON.stringify(fileMsg));
                            
                            addSystemMessage(`✅ Файл "${data.fileName}" загружен`);
                        }
                    } catch (e) {
                        console.error('Ошибка парсинга:', e);
                        addSystemMessage('❌ Ошибка данных от сервера');
                    }
                } else {
                    console.log('Получен бинарный чанк, размер:', event.data.byteLength);
                }
            };

            ws.onclose = function() {
                connected = false;
                document.getElementById('status').innerHTML = '🔴 Отключено';
                document.getElementById('text').disabled = true;
                document.getElementById('send-btn').disabled = true;
                document.getElementById('file-btn').disabled = true;
                addSystemMessage('❌ Отключился от чата');
                document.getElementById('connect-screen').classList.remove('hidden');
            };

            ws.onerror = function(error) {
                console.error('WebSocket ошибка:', error);
                addSystemMessage('❌ Ошибка подключения');
            };
        }

        function send() {
            if (!connected) return;
            const text = document.getElementById('text').value.trim();
            if (!text) return;
            
            ws.send(JSON.stringify({
                type: 'message',
                text: text
            }));
            
            document.getElementById('text').value = '';
        }

        function selectFile() {
            document.getElementById('file-input').click();
        }

        document.getElementById('file-input').onchange = function() {
            if (!this.files || this.files.length === 0 || !connected) return;
            
            const file = this.files[0];
            
            // Проверка размера (макс 100 МБ)
            if (file.size > 100 * 1024 * 1024) {
                alert('Файл слишком большой! Максимум 100 МБ');
                return;
            }
            
            // Отправляем метаданные
            ws.send(JSON.stringify({
                type: 'file_metadata',
                fileName: file.name,
                fileType: file.type.startsWith('image/') ? 'image' : 
                          file.type.startsWith('video/') ? 'video' : 
                          file.type.startsWith('audio/') ? 'audio' : 'file',
                fileSize: file.size
            }));
            
            // Используем большой чанк 64 КБ для надежности
            const chunkSize = 64 * 1024; // 64 КБ
            let offset = 0;
            let chunkIndex = 0;
            const totalChunks = Math.ceil(file.size / chunkSize);
            
            const progress = document.getElementById('file-progress');
            progress.style.display = 'block';
            progress.innerHTML = `0% (${file.name}) [0/${totalChunks}]`;
            
            function sendNextChunk() {
                const chunk = file.slice(offset, offset + chunkSize);
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    try {
                        // Отправляем чанк
                        ws.send(e.target.result);
                        
                        offset += chunkSize;
                        chunkIndex++;
                        let percent = Math.min(100, Math.round((offset / file.size) * 100));
                        progress.innerHTML = `${percent}% (${file.name}) [${chunkIndex}/${totalChunks}]`;
                        
                        if (offset < file.size) {
                            // Задержка между чанками, чтобы не перегружать канал
                            setTimeout(sendNextChunk, 30);
                        } else {
                            progress.innerHTML = `✅ 100% (${file.name}) - ожидание подтверждения...`;
                        }
                    } catch (err) {
                        console.error('Ошибка отправки чанка:', err);
                        progress.innerHTML = '❌ Ошибка отправки';
                        setTimeout(() => progress.style.display = 'none', 3000);
                    }
                };
                
                reader.onerror = function() {
                    progress.innerHTML = '❌ Ошибка чтения файла';
                    setTimeout(() => progress.style.display = 'none', 3000);
                };
                
                reader.readAsArrayBuffer(chunk);
            }
            
            sendNextChunk();
            this.value = '';
        };

        function addMessage(msg) {
            const messagesDiv = document.getElementById('messages');
            const div = document.createElement('div');
            
            if (msg.sender === 'system') {
                div.className = 'message system';
                div.innerText = msg.text;
            } else {
                div.className = 'message ' + (msg.sender === device ? 'my' : 'other');
                
                let content = '<b>' + (msg.sender === device ? 'Я' : msg.sender) + ':</b> ';
                
                if (msg.fileId) {
                    if (msg.fileType === 'image') {
                        content += '<div><img src="/file/' + msg.fileId + '" class="media-preview" onclick="window.open(\'/file/' + msg.fileId + '\')"></div>';
                    } else if (msg.fileType === 'video') {
                        content += '<div><video src="/file/' + msg.fileId + '" controls style="max-width:200px; max-height:200px;"></video></div>';
                    } else if (msg.fileType === 'audio') {
                        content += '<div><audio src="/file/' + msg.fileId + '" controls></audio></div>';
                    } else {
                        content += '<div><a href="/file/' + msg.fileId + '" class="file-link" target="_blank">📎 ' + (msg.fileName || 'Файл') + '</a></div>';
                    }
                }
                
                if (msg.text && !msg.text.startsWith('📎')) {
                    content += msg.text;
                }
                
                div.innerHTML = content;
            }
            
            messagesDiv.appendChild(div);
            div.scrollIntoView({behavior: 'smooth'});
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'message system';
            div.innerText = text;
            document.getElementById('messages').appendChild(div);
            div.scrollIntoView({behavior: 'smooth'});
        }

        document.getElementById('text').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && connected) send();
        });
    </script>
</body>
</html>
